name: CI

on:
  pull_request:

jobs:
  build-and-test:
    name: Validate, Build, and Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Check Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted correctly:"
            gofmt -l .
            echo "Please run 'go fmt ./...' locally and commit the changes."
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build Project
        run: go build -v ./...

      - name: Build Docker Image
        run: docker build --platform linux/amd64 -t pluck:ci .